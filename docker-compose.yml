services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: backup_validator
      POSTGRES_USER: validator
      POSTGRES_PASSWORD: validator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
